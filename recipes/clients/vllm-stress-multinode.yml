name: "vllm-stress-multinode"
description: "Distributed stress test for vLLM - Extreme Load"

target:
  service: vllm-server
  protocol: http
  timeout_seconds: 600

workload:
  pattern: "closed-loop"
  duration_seconds: 1200
  concurrent_users: 256  
  think_time_ms: 0      

dataset:
  type: "synthetic"
  params:
    service_type: "vllm"
    model_name: "mistralai/Mistral-7B-Instruct-v0.2"
    prompt_length: 256
    max_tokens: 512
    temperature: 0.7

orchestration:
  mode: "slurm"
  instances: 4          
  resources:
    cpu_cores: 32
    memory_gb: 64

output:
  metrics: ["latency", "throughput", "errors"]
  format: "json"
  destination: "./results/vllm_multi"