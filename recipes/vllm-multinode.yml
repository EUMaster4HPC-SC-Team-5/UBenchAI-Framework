name: vllm-multinode-server
description: "vLLM Distributed Inference with Ray Cluster"
image: 'docker://vllm/vllm-openai:v0.6.3.post1'

resources:
  nodes: 2                
  ntasks: 2              
  ntasks_per_node: 1
  cpu_cores: 16
  memory_gb: 128
  gpu_count: 4            
  time_limit: "01:00:00"

ports:
  - container_port: 8000
    host_port: 8000
    protocol: tcp
  - container_port: 6379  
    host_port: 6379
    protocol: tcp
  - container_port: 8265  
    host_port: 8265
    protocol: tcp

environment:
  VLLM_HOST: 0.0.0.0
  VLLM_PORT: '8000'
  HF_HOME: /root/.cache/huggingface
  RAY_HEAD_PORT: '6379'
  NCCL_SOCKET_IFNAME: 'ib0'
  NCCL_IB_DISABLE: '0'

volumes:
  - host_path: /project/scratch/$SLURM_JOB_ACCOUNT/$USER/vllm_cache
    container_path: /root/.cache/huggingface
    readonly: false

healthcheck:
  endpoint: /health
  interval_seconds: 20
  timeout_seconds: 10
  initial_delay: 120

command: >
  set -e
  
  # Setup Environment Vars
  export RAY_HEAD_HOSTNAME=$(scontrol show hostnames "$SLURM_JOB_NODELIST" | head -n 1)
  export RAY_HEAD_ADDRESS=$(getent hosts $RAY_HEAD_HOSTNAME | awk '{ print $1 }')
  GPU_COUNT=$(nvidia-smi --query-gpu=name --format=csv,noheader | wc -l)

  echo "Head Node: $RAY_HEAD_HOSTNAME ($RAY_HEAD_ADDRESS)"

  # --- HEAD NODE LOGIC ---
  if [ "$SLURM_PROCID" -eq 0 ]; then
      echo "Starting Ray HEAD..."
      ray start --head --host=0.0.0.0 --port=$RAY_HEAD_PORT --num-gpus=$GPU_COUNT --block &
      RAY_PID=$!
      sleep 30

      echo "Starting vLLM Server..."
      # Notare: tensor-parallel-size = Nodi * GPU_per_Nodo
      TOTAL_GPUS=$(( $SLURM_NNODES * $GPU_COUNT ))
      
      python -m vllm.entrypoints.api_server \
          --host "$VLLM_HOST" \
          --port "$VLLM_PORT" \
          --model "mistralai/Mistral-7B-Instruct-v0.2" \
          --tensor-parallel-size $TOTAL_GPUS \
          --distributed-executor-backend "ray" \
          --gpu-memory-utilization 0.90 \
          --trust-remote-code &
      
      wait $RAY_PID

  # --- WORKER NODE LOGIC ---
  else
      echo "Starting Ray WORKER..."
      sleep 30 # Aspetta che head sia su
      ray start --address="$RAY_HEAD_ADDRESS:$RAY_HEAD_PORT" --num-gpus=$GPU_COUNT --block
  fi