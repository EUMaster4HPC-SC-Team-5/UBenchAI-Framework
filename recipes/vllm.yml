name: vllm-server
description: "vLLM Single-Node Inference Server"
image: docker://vllm/vllm-openai:v0.6.3.post1

resources:
  nodes: 1
  ntasks: 1
  cpu_cores: 16
  memory_gb: 128
  gpu_count: 4          
  time_limit: "01:00:00"

ports:
  - container_port: 8000
    host_port: 8000
    protocol: tcp

environment:
  VLLM_HOST: "0.0.0.0"
  VLLM_PORT: "8000"
  HF_HOME: "/root/.cache/huggingface"
  NCCL_DEBUG: "INFO"

volumes:
  - host_path: /project/scratch/$SLURM_JOB_ACCOUNT/$USER/vllm_cache
    container_path: /root/.cache/huggingface
    readonly: false

healthcheck:
  endpoint: /health
  interval_seconds: 15
  timeout_seconds: 5
  retries: 5
  initial_delay: 60

command:
  - /bin/bash
  - -c
  - |
    set -e
    echo "Started vLLM Single Node"
    
    # Auto-detect GPU count
    GPU_COUNT=$(nvidia-smi --query-gpu=name --format=csv,noheader | wc -l)
    echo "Detected $GPU_COUNT GPUs"

    python3 -m vllm.entrypoints.openai.api_server \
      --model mistralai/Mistral-7B-Instruct-v0.2 \
      --host 0.0.0.0 \
      --port 8000 \
      --tensor-parallel-size $GPU_COUNT \
      --gpu-memory-utilization 0.90 \
      --max-model-len 8192 \
      --trust-remote-code